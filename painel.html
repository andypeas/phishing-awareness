<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel SI — Cliques de Phishing | Natto</title>
<link rel="icon" href="img/favicon.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1B7A2B;
    --green-dark: #145E21;
    --green-light: #E8F5E9;
    --red: #D32F2F;
    --red-light: #FFEBEE;
    --orange: #E65100;
    --bg: #0F1A10;
    --bg-card: #162117;
    --bg-card-hover: #1C2D1E;
    --border: rgba(27,122,43,0.2);
    --text: #E8F5E9;
    --text-muted: #7DA67D;
    --white: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 38px; height: 38px;
    background: var(--green);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 1rem;
  }

  .header-title {
    font-weight: 600;
    font-size: 1rem;
    color: var(--text);
  }

  .header-title span {
    font-weight: 400;
    color: var(--text-muted);
    font-size: 0.8rem;
    display: block;
  }

  .header-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    background: rgba(27,122,43,0.15);
    color: var(--green);
    padding: 5px 12px;
    border-radius: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid var(--border);
  }

  /* CONTAINER */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    text-align: center;
  }

  .stat-card .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 8px;
  }

  .stat-card .value {
    font-family: 'Space Mono', monospace;
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--green);
    line-height: 1;
  }

  .stat-card .value.red { color: var(--red); }
  .stat-card .value.orange { color: var(--orange); }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .toolbar h2 {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toolbar h2 .dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: blink 1.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .toolbar-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover {
    background: var(--bg-card-hover);
    border-color: var(--green);
  }

  .btn.danger {
    border-color: rgba(211,47,47,0.3);
    color: var(--red);
  }

  .btn.danger:hover {
    background: rgba(211,47,47,0.1);
    border-color: var(--red);
  }

  /* TABLE */
  .table-wrap {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    background: rgba(27,122,43,0.08);
    padding: 12px 16px;
    font-size: 0.72rem;
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    text-align: left;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
  }

  tbody tr {
    border-bottom: 1px solid rgba(27,122,43,0.08);
    transition: background 0.15s ease;
  }

  tbody tr:hover {
    background: var(--bg-card-hover);
  }

  tbody tr:last-child {
    border-bottom: none;
  }

  td {
    padding: 12px 16px;
    font-size: 0.9rem;
    color: var(--text);
    vertical-align: middle;
  }

  td.user-col {
    font-weight: 600;
    color: var(--white);
  }

  td.time-col {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  td.platform-col {
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  .order-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-muted);
    background: rgba(27,122,43,0.1);
    width: 28px; height: 28px;
    display: inline-flex;
    align-items: center; justify-content: center;
    border-radius: 6px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state svg {
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-state p {
    font-size: 0.95rem;
    margin-bottom: 6px;
  }

  .empty-state small {
    font-size: 0.8rem;
    opacity: 0.6;
  }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .loading::after {
    content: '';
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-left: 10px;
    vertical-align: middle;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .stats-row { grid-template-columns: 1fr; }
    .header { padding: 12px 16px; }
    .container { padding: 20px 12px; }
    td, th { padding: 10px 10px; font-size: 0.82rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-icon">N</div>
    <div class="header-title">
      Painel de Campanha
      <span>Phishing Simulado — Natto</span>
    </div>
  </div>
  <div class="header-badge">Restrito — SI</div>
</div>

<div class="container">

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="label">Total de Cliques</div>
      <div class="value red" id="totalClicks">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Usuários Únicos</div>
      <div class="value orange" id="uniqueUsers">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Último Clique</div>
      <div class="value" id="lastClick" style="font-size:1rem;">—</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <h2><span class="dot"></span> Registro de Cliques (Tempo Real)</h2>
    <div class="toolbar-actions">
      <button class="btn" onclick="exportCSV()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar CSV
      </button>
      <button class="btn danger" onclick="resetCampaign()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        Zerar Campanha
      </button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Colaborador</th>
          <th>Data / Hora</th>
          <th>Plataforma</th>
        </tr>
      </thead>
      <tbody id="clicksTable">
        <tr><td colspan="4" class="loading">Carregando dados</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey:            "AIzaSyB8i_CRmJjMXv4TvETAMfl_SJFbulCXLC0",
    authDomain:        "phishing-awareness-e4435.firebaseapp.com",
    databaseURL:       "https://phishing-awareness-e4435-default-rtdb.firebaseio.com",
    projectId:         "phishing-awareness-e4435",
    storageBucket:     "phishing-awareness-e4435.firebasestorage.app",
    messagingSenderId: "350527697285",
    appId:             "1:350527697285:web:02ea5c9b47412c7bde54ec"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const counterRef = db.ref('phishing_campaign/click_count');
  const clicksRef  = db.ref('phishing_campaign/clicks');

  let allClicks = [];

  // Simplifica o User Agent para exibição
  function parseNavegador(ua) {
    if (!ua) return 'Desconhecido';
    if (ua.includes('Edg/'))    return 'Edge';
    if (ua.includes('Chrome'))  return 'Chrome';
    if (ua.includes('Firefox')) return 'Firefox';
    if (ua.includes('Safari'))  return 'Safari';
    return 'Outro';
  }

  function parsePlataforma(p, ua) {
    if (p && p !== 'desconhecido') return p;
    if (!ua) return '—';
    if (ua.includes('Windows')) return 'Windows';
    if (ua.includes('Android')) return 'Android';
    if (ua.includes('iPhone'))  return 'iPhone';
    if (ua.includes('Mac'))     return 'macOS';
    if (ua.includes('Linux'))   return 'Linux';
    return '—';
  }

  // Atualiza contador total
  counterRef.on('value', function(snapshot) {
    document.getElementById('totalClicks').textContent = snapshot.val() || 0;
  });

  // Escuta a lista de cliques em tempo real
  clicksRef.orderByChild('timestamp').on('value', function(snapshot) {
    const tbody = document.getElementById('clicksTable');
    allClicks = [];

    if (!snapshot.exists()) {
      tbody.innerHTML = `
        <tr><td colspan="4">
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <p>Nenhum clique registrado</p>
            <small>Os cliques aparecerão aqui em tempo real</small>
          </div>
        </td></tr>`;
      document.getElementById('uniqueUsers').textContent = '0';
      document.getElementById('lastClick').textContent = '—';
      return;
    }

    const entries = [];
    snapshot.forEach(function(child) {
      entries.push({ key: child.key, ...child.val() });
    });

    // Ordena do mais recente para o mais antigo
    entries.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    allClicks = entries;

    // Usuários únicos
    const uniqueSet = new Set(entries.map(e => e.usuario));
    document.getElementById('uniqueUsers').textContent = uniqueSet.size;

    // Último clique
    if (entries.length > 0) {
      document.getElementById('lastClick').textContent = entries[0].data_hora || '—';
    }

    // Monta a tabela
    let html = '';
    entries.forEach(function(entry, index) {
      const nav = parseNavegador(entry.navegador);
      const plat = parsePlataforma(entry.plataforma, entry.navegador);

      html += `
        <tr>
          <td><span class="order-num">${index + 1}</span></td>
          <td class="user-col">${escapeHtml(entry.usuario)}</td>
          <td class="time-col">${escapeHtml(entry.data_hora || '—')}</td>
          <td class="platform-col">${escapeHtml(nav)} · ${escapeHtml(plat)}</td>
        </tr>`;
    });

    tbody.innerHTML = html;
  });

  // Previne XSS
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // Exporta CSV
  function exportCSV() {
    if (allClicks.length === 0) {
      alert('Nenhum dado para exportar.');
      return;
    }

    let csv = '\uFEFF#,Colaborador,Data/Hora,Navegador,Plataforma\n';
    allClicks.forEach(function(entry, i) {
      const nav  = parseNavegador(entry.navegador);
      const plat = parsePlataforma(entry.plataforma, entry.navegador);
      csv += `${i+1},"${entry.usuario}","${entry.data_hora || '—'}","${nav}","${plat}"\n`;
    });

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'phishing_cliques_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
  }

  // Zera toda a campanha
  function resetCampaign() {
    if (!confirm('Tem certeza que deseja zerar TODOS os dados da campanha?\n\nIsso apagará o contador e todos os registros de cliques.\n\nEssa ação não pode ser desfeita.')) return;
    if (!confirm('Confirmação final: APAGAR TUDO?')) return;

    db.ref('phishing_campaign').set({ click_count: 0 }).then(function() {
      alert('Campanha zerada com sucesso.');
    }).catch(function(err) {
      alert('Erro ao zerar: ' + err.message);
    });
  }
</script>

</body>
</html>
